<div class="armor-display" style="display: flex; align-items: flex-start; justify-content: flex-start; gap: 40px;">
  <div class="armor-diagram" style="position: relative;">
    <img src="systems/deathwatch/icons/armor/armor.webp" alt="Power Armor" style="max-width: 200px; display: block;" />
  </div>
  
  <div class="armor-inputs">
    <div style="display: flex; flex-direction: column; gap: 10px;">
      <div class="resource" style="display: flex; align-items: center; gap: 10px;">
        <label class="resource-label" style="min-width: 80px;">Head</label>
        <input type="number" name="system.armor.head" value="{{system.armor.head}}" data-dtype="Number" min="0" style="width: 60px;" />
      </div>
      <div class="resource" style="display: flex; align-items: center; gap: 10px;">
        <label class="resource-label" style="min-width: 80px;">Body</label>
        <input type="number" name="system.armor.body" value="{{system.armor.body}}" data-dtype="Number" min="0" style="width: 60px;" />
      </div>
      <div class="resource" style="display: flex; align-items: center; gap: 10px;">
        <label class="resource-label" style="min-width: 80px;">Left Arm</label>
        <input type="number" name="system.armor.left_arm" value="{{system.armor.left_arm}}" data-dtype="Number" min="0" style="width: 60px;" />
      </div>
      <div class="resource" style="display: flex; align-items: center; gap: 10px;">
        <label class="resource-label" style="min-width: 80px;">Right Arm</label>
        <input type="number" name="system.armor.right_arm" value="{{system.armor.right_arm}}" data-dtype="Number" min="0" style="width: 60px;" />
      </div>
      <div class="resource" style="display: flex; align-items: center; gap: 10px;">
        <label class="resource-label" style="min-width: 80px;">Left Leg</label>
        <input type="number" name="system.armor.left_leg" value="{{system.armor.left_leg}}" data-dtype="Number" min="0" style="width: 60px;" />
      </div>
      <div class="resource" style="display: flex; align-items: center; gap: 10px;">
        <label class="resource-label" style="min-width: 80px;">Right Leg</label>
        <input type="number" name="system.armor.right_leg" value="{{system.armor.right_leg}}" data-dtype="Number" min="0" style="width: 60px;" />
      </div>
    </div>
  </div>
</div>
