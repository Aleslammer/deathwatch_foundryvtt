<div class="traits-section">
  <h3 class="section-header">Traits</h3>
  <ol class="items-list traits-list">
    {{#each traits as |item id|}}
    <li class="item flexrow" data-item-id="{{item._id}}" draggable="true">
      <div class="item-name">
        <div class="item-image" style="background-image: url({{item.img}})"></div>
        <h4 class="trait-show" style="cursor: pointer;">
          {{item.name}}
          {{#if item.multiplier}}
            <span style="color: #4b9cd3; font-weight: bold;"> (x{{item.multiplier}})</span>
          {{else if (gt item.count 1)}}
            <span style="color: #888;"> ({{item.count}})</span>
          {{/if}}
        </h4>
      </div>
      <div class="item-controls">
        <a class="item-control item-create" title="Create Trait" data-type="trait"><i class="fas fa-plus"></i></a>
        <a class="item-control item-edit" title="Edit Item"><i class="fas fa-edit"></i></a>
        <a class="item-control item-delete" title="Delete Item"><i class="fas fa-trash"></i></a>
      </div>
    </li>
    {{/each}}
  </ol>
</div>
