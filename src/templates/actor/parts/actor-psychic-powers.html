<div class="psychic-powers-section">
  <h3 class="section-header">Psychic Powers</h3>
  <ol class="items-list psychic-powers-list">
    <li class="item flexrow items-header">
      <div class="item-name" style="text-align: left;">Name</div>
      <div class="item-class" style="text-align: left;">Class</div>
      <div class="item-action" style="text-align: left;">Action</div>
      <div class="item-range" style="text-align: left;">Range</div>
      <div class="item-controls">
        <a class="item-control item-create" title="Create Psychic Power" data-type="psychic-power"><i class="fas fa-plus"></i></a>
      </div>
    </li>
    {{#each psychicPowers as |item id|}}
    <li class="item flexrow" data-item-id="{{item._id}}" draggable="true">
      <div class="item-name">
        <div class="item-image" style="background-image: url({{item.img}})"></div>
        <h4 class="psychic-power-show" style="cursor: pointer;">{{item.name}}</h4>
      </div>
      <div class="item-class">{{item.system.class}}</div>
      <div class="item-action">{{item.system.action}}</div>
      <div class="item-range">{{item.system.range}}</div>
      <div class="item-controls">
        <a class="item-control item-edit" title="Edit Item"><i class="fas fa-edit"></i></a>
        <a class="item-control item-delete" title="Delete Item"><i class="fas fa-trash"></i></a>
      </div>
    </li>
    {{/each}}
  </ol>
</div>
