<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
  <div style="display: flex; align-items: center; gap: 8px;">
    <label style="width: 80px; flex-shrink: 0;">Gender</label>
    <input type="text" name="system.gender" value="{{system.gender}}" placeholder="Gender" style="flex: 1;" />
  </div>
  <div style="display: flex; align-items: center; gap: 8px;">
    <label style="width: 80px; flex-shrink: 0;">Age</label>
    <input type="text" name="system.age" value="{{system.age}}" placeholder="Age" style="flex: 1;" />
  </div>
  <div style="display: flex; align-items: center; gap: 8px;">
    <label style="width: 80px; flex-shrink: 0;">Complexion</label>
    <input type="text" name="system.complexion" value="{{system.complexion}}" placeholder="Complexion" style="flex: 1;" />
  </div>
  <div style="display: flex; align-items: center; gap: 8px;">
    <label style="width: 80px; flex-shrink: 0;">Hair</label>
    <input type="text" name="system.hair" value="{{system.hair}}" placeholder="Hair" style="flex: 1;" />
  </div>
</div>
