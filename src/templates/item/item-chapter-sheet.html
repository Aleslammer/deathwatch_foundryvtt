<div class="{{cssClass}} flexcol" autocomplete="off">
  <header class="sheet-header">
    <img class="profile-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" height="100" width="100"/>
    <div class="header-fields">
      <h1 class="charname"><input name="name" type="text" value="{{item.name}}" placeholder="Name"/></h1>
      <div style="display: flex; gap: 10px; margin-top: 5px;">
        <div style="flex: 4;">
          <label>Book:</label>
          <input type="text" name="system.book" value="{{system.book}}" placeholder="Book" readonly class="effective-field" style="width: 100%;"/>
        </div>
        <div style="flex: 1;">
          <label>Page:</label>
          <input type="text" name="system.page" value="{{system.page}}" placeholder="Page" readonly class="effective-field" style="width: 100%; text-align: center;"/>
        </div>
      </div>
    </div>
  </header>

  <section class="sheet-body">
    <div class="description-section">
      <h3 class="section-header">Description</h3>
      {{editor system.description target="system.description" rollData=rollData button=true owner=owner editable=editable engine="prosemirror"}}
    </div>
  </section>
</div>
