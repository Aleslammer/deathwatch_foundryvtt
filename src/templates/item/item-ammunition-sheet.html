<form class="{{cssClass}}" autocomplete="off">
    <header class="sheet-header">
        <img class="profile-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" />
        <div class="header-fields">
            <h1 class="charname"><input name="name" type="text" value="{{item.name}}" placeholder="Name" /></h1>
        </div>
    </header>

    {{!-- Sheet Tab Navigation --}}
    <nav class="sheet-tabs tabs" data-group="primary">
        <a class="item" data-tab="description">Description</a>
        <a class="item" data-tab="attributes">Attributes</a>
    </nav>

    {{!-- Sheet Body --}}
    <section class="sheet-body">

        {{!-- Description Tab --}}
        <div class="tab" data-group="primary" data-tab="description">
            {{editor system.description target="system.description" rollData=rollData button=true editable=editable}}
        </div>

        {{!-- Attributes Tab --}}
        <div class="tab attributes" data-group="primary" data-tab="attributes">
            <div class="grid grid-2col">
                <div class="resource">
                    <label class="resource-label">Quantity</label>
                    <input type="number" name="system.quantity" value="{{system.quantity}}" data-dtype="Number" />
                </div>
                <div class="resource">
                    <label class="resource-label">Capacity (Max)</label>
                    <input type="number" name="system.capacity.max" value="{{system.capacity.max}}" data-dtype="Number" />
                </div>
                <div class="resource">
                    <label class="resource-label">Current Rounds</label>
                    <input type="number" name="system.capacity.value" value="{{system.capacity.value}}" data-dtype="Number" />
                </div>
                <div class="resource">
                    <label class="resource-label">Requisition</label>
                    <input type="number" name="system.req" value="{{system.req}}" data-dtype="Number" />
                </div>
                <div class="resource">
                    <label class="resource-label">Renown</label>
                    <input type="text" name="system.renown" value="{{system.renown}}" />
                </div>
            </div>
        </div>
    </section>
</form>
