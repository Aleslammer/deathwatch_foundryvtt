<div class="{{cssClass}}" autocomplete="off">
  <header class="sheet-header" style="background-image: url('{{item.img}}'); background-size: cover; background-position: top left; padding: 10px; padding-bottom: 50px; border-radius: 4px; position: relative;">
    <div class="header-fields" style="position: relative; z-index: 1;">
      <h1 class="charname"><input name="name" type="text" value="{{item.name}}" placeholder="Name" style="background: rgba(0,0,0,0.49); color: #fff; padding: 2px 6px; border-radius: 3px;" /></h1>
      <div class="form-group" style="margin-top: 5px;">
        <label style="font-weight: bold; font-size: 0.9em; color: #fff; padding: 1px 5px; text-align: right; min-width: 80px;">Action:</label>
        <input type="text" name="system.action" value="{{system.action}}" placeholder="e.g., Full, Half, Free" style="margin-top: 2px; background: rgba(255,255,255,0.75); color: #000;" />
      </div>
      <div class="form-group" style="margin-top: 5px;">
        <label style="font-weight: bold; font-size: 0.9em; color: #fff; padding: 1px 5px; text-align: right; min-width: 80px;">Opposed:</label>
        <input type="text" name="system.opposed" value="{{system.opposed}}" placeholder="Yes or No" style="margin-top: 2px; background: rgba(255,255,255,0.75); color: #000;" />
      </div>
      <div class="form-group" style="margin-top: 5px;">
        <label style="font-weight: bold; font-size: 0.9em; color: #fff; padding: 1px 5px; text-align: right; min-width: 80px;">Range:</label>
        <input type="text" name="system.range" value="{{system.range}}" placeholder="e.g., 30m, 5 metres x PR" style="margin-top: 2px; background: rgba(255,255,255,0.75); color: #000;" />
      </div>
      <div class="form-group" style="margin-top: 5px;">
        <label style="font-weight: bold; font-size: 0.9em; color: #fff; padding: 1px 5px; text-align: right; min-width: 80px;">Sustained:</label>
        <input type="text" name="system.sustained" value="{{system.sustained}}" placeholder="Yes or No" style="margin-top: 2px; background: rgba(255,255,255,0.75); color: #000;" />
      </div>
      <div class="form-group" style="margin-top: 5px;">
        <label style="font-weight: bold; font-size: 0.9em; color: #fff; padding: 1px 5px; text-align: right; min-width: 80px;">XP Cost:</label>
        <input type="number" name="system.cost" value="{{system.cost}}" placeholder="0" data-dtype="Number" style="margin-top: 2px; width: 100px; background: rgba(255,255,255,0.75); color: #000;" />
      </div>
      <div class="form-group" style="margin-top: 5px;">
        <label style="font-weight: bold; font-size: 0.9em; color: #fff; padding: 1px 5px; text-align: right; min-width: 80px;">Damage:</label>
        <input type="text" name="system.damageFormula" value="{{system.damageFormula}}" placeholder="e.g., 1d10*PR" style="margin-top: 2px; background: rgba(255,255,255,0.75); color: #000;" />
      </div>
      <div class="form-group" style="margin-top: 5px;">
        <label style="font-weight: bold; font-size: 0.9em; color: #fff; padding: 1px 5px; text-align: right; min-width: 80px;">Penetration:</label>
        <input type="text" name="system.penetrationFormula" value="{{system.penetrationFormula}}" placeholder="e.g., PR, 2*PR" style="margin-top: 2px; background: rgba(255,255,255,0.75); color: #000;" />
      </div>
      <div class="form-group" style="margin-top: 5px;">
        <label style="font-weight: bold; font-size: 0.9em; color: #fff; padding: 1px 5px; text-align: right; min-width: 80px;">Dmg Type:</label>
        <input type="text" name="system.damageType" value="{{system.damageType}}" placeholder="e.g., Energy, Impact" style="margin-top: 2px; background: rgba(255,255,255,0.75); color: #000;" />
      </div>
    </div>
    {{#if system.chapterImg}}
    <img class="chapter-img" src="{{system.chapterImg}}" title="Chapter" height="60" width="60" style="position: absolute; bottom: 8px; left: 8px; border: 2px solid rgba(255,255,255,0.5); border-radius: 4px;" />
    {{/if}}
  </header>

  <nav class="sheet-tabs tabs" data-group="primary">
    <a class="item" data-tab="description">Description</a>
    <a class="item" data-tab="source">Source</a>
  </nav>

  <section class="sheet-body">
    <div class="tab" data-group="primary" data-tab="description">
      {{#if editable}}
      <prose-mirror name="system.description"
                    value="{{source.description}}"
                    document-uuid="{{item.uuid}}"
                    style="height: 100%;">
      </prose-mirror>
      {{else}}
      <div class="editor" style="height: 100%; padding: 8px; overflow-y: auto;">
        <div class="editor-content">{{{enriched.description}}}</div>
      </div>
      {{/if}}
    </div>
    <div class="tab" data-group="primary" data-tab="source">
      <div class="form-group flexrow">
        <div class="flex1">
          <label>Book:</label>
          <input type="text" name="system.book" value="{{system.book}}" placeholder="e.g., Core Rulebook" />
        </div>
        <div class="flex1">
          <label>Page:</label>
          <input type="text" name="system.page" value="{{system.page}}" placeholder="e.g., 194" />
        </div>
      </div>
    </div>
  </section>
</div>
