<form class="{{cssClass}}" autocomplete="off">
  <header class="sheet-header">
    <img class="profile-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" height="64" width="64" />
    <div class="header-fields">
      <h1 class="charname"><input name="name" type="text" value="{{item.name}}" placeholder="Name" /></h1>
    </div>
  </header>

  <nav class="sheet-tabs tabs" data-group="primary">
    <a class="item" data-tab="details">Details</a>
    <a class="item" data-tab="description">Description</a>
  </nav>

  <section class="sheet-body">
    <div class="tab" data-group="primary" data-tab="details">
      <div class="form-group">
        <label>Location:</label>
        <input type="text" name="system.location" value="{{system.location}}" placeholder="e.g., Head, Body, Arm, Leg" />
      </div>
      <div class="form-group">
        <label>Damage Type:</label>
        <input type="text" name="system.damageType" value="{{system.damageType}}" placeholder="e.g., Impact, Energy, Rending" />
      </div>
      <div class="form-group">
        <label>Effects:</label>
        <textarea name="system.effects" rows="4">{{#each system.effects}}{{this}}
{{/each}}</textarea>
      </div>
    </div>
    <div class="tab" data-group="primary" data-tab="description">
      {{editor system.description target="system.description" button=true owner=owner editable=editable}}
    </div>
  </section>
</form>
