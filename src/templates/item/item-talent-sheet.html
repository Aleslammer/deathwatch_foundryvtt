<div class="{{cssClass}}" autocomplete="off">
  <header class="sheet-header">
    <img class="profile-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" height="64" width="64" />
    <div class="header-fields">
      <h1 class="charname"><input name="name" type="text" value="{{item.name}}" placeholder="Name" /></h1>
    </div>
  </header>

  <nav class="sheet-tabs tabs" data-group="primary">
    <a class="item" data-tab="description">Description</a>
    <a class="item" data-tab="attributes">Attributes</a>
    <a class="item" data-tab="source">Source</a>
  </nav>

  <section class="sheet-body">
    <div class="tab" data-group="primary" data-tab="description">
      {{editor system.description target="system.description" button=true owner=owner editable=editable engine="prosemirror"}}
    </div>
    <div class="tab" data-group="primary" data-tab="attributes">
      <div class="form-group" style="margin-bottom: 6px;">
        <label>Prerequisite:</label>
        <input type="text" name="system.prerequisite" value="{{system.prerequisite}}" placeholder="" style="flex: 1;" />
      </div>
      <div class="form-group" style="margin-bottom: 6px;">
        <label>Benefit:</label>
        <input type="text" name="system.benefit" value="{{system.benefit}}" placeholder="Short benefit summary" style="flex: 1;" />
      </div>
      <div class="form-group flexrow" style="margin-bottom: 6px; gap: 10px;">
        <div class="flex1">
          <label>XP Cost:</label>
          <input type="number" name="system.cost" value="{{system.cost}}" placeholder="0" data-dtype="Number" />
        </div>
        <div class="flex1">
          <label>Subsequent Cost:</label>
          <input type="number" name="system.subsequentCost" value="{{system.subsequentCost}}" placeholder="0" data-dtype="Number" />
        </div>
      </div>
      <div class="form-group" style="margin-bottom: 6px;">
        <label>
          <input type="checkbox" name="system.stackable" {{checked system.stackable}} />
          Stackable (can be taken multiple times)
        </label>
      </div>
    </div>
    <div class="tab" data-group="primary" data-tab="source">
      <div class="form-group flexrow">
        <div class="flex1">
          <label>Book:</label>
          <input type="text" name="system.book" value="{{system.book}}" placeholder="e.g., Core Rulebook" />
        </div>
        <div class="flex1">
          <label>Page:</label>
          <input type="text" name="system.page" value="{{system.page}}" placeholder="e.g., 40" />
        </div>
      </div>
    </div>
  </section>
</div>
